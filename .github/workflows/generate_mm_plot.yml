name: Generate March Madness Efficiency Plot

on:
  workflow_dispatch:

jobs:
  generate-plot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          install.packages(c("tidyverse", "ggimage", "scales"))
        shell: Rscript {0}

      - name: Generate Plot
        run: Rscript generate_mm_plot.R

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add plots/kenpom_mm_eff.png
          git commit -m "Update March Madness efficiency plot" || echo "No changes to commit"
          git push
